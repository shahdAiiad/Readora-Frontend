<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readora - الملف الشخصي</title>
    <meta name="description" content="إدارة ملفك الشخصي وقراءاتك المفضلة على ريدورا.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: var(--radius-round);
            object-fit: cover;
            border: 4px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-start;
        }

        .profile-info h2 {
            font-size: 2rem;
            margin-bottom: 0.25rem;
        }

        .profile-info p {
            color: var(--text-secondary);
            margin: 0;
        }

        .profile-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: var(--accent-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }



        @media (max-width: 576px) {
            .glass-panel {
                padding: 1.25rem 1rem;
            }

            .profile-header {
                gap: 0.9rem;
                margin-bottom: 1.35rem;
            }

            .profile-avatar {
                width: 84px;
                height: 84px;
            }

            .profile-info {
                gap: 0.55rem;
            }

            .profile-info h2 {
                font-size: 1.25rem;
                margin-bottom: 0;
            }

            .profile-info p {
                font-size: 0.92rem;
                line-height: 1.45;
            }

            .profile-info .btn {
                padding: 0.65rem 1rem;
                font-size: 0.92rem;
            }

            .stats-grid {
                gap: 0.75rem;
                margin-bottom: 2rem;
            }

            .stat-card {
                padding: 0.9rem 0.6rem;
                min-height: 96px;
            }

            .stat-value {
                font-size: 1.45rem;
                margin-bottom: 0.3rem;
            }

            .stat-label {
                font-size: 0.84rem;
                line-height: 1.35;
            }
        }
    </style>
    <link rel="icon" href="./assets/images/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="./assets/images/icon.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0a0e17">
</head>

<body>
    <!-- Navbar -->
    <div id="navbar-root"></div>

    <div style="height: 100px;"></div>

    <section class="section" style="padding-top: 0;">
        <div class="container">
            <div class="glass-panel" style="padding: 3rem;">
                <div class="profile-header">
                    <img src="https://picsum.photos/seed/avatar/200/200" alt="Avatar" class="profile-avatar"
                        id="profile-display-avatar">
                    <div class="profile-info">
                        <h2 id="profile-display-name">Shahd Aiiad</h2>
                        <p id="profile-display-bio" data-i18n="profile_bio">قارئ شغوف | عضو منذ 2026</p>
                        <p id="profile-display-email" style="color: var(--text-secondary); margin: 0;">shahd@example.com
                        </p>
                        <div class="profile-actions">
                            <button type="button" class="btn btn-secondary" id="profile-edit-btn"
                                data-i18n="edit_profile">تعديل الملف الشخصي</button>
                            <button type="button" class="btn btn-secondary" id="profile-logout-btn"
                                data-i18n="auth_logout"> Logout</button>
                        </div>
                    </div>
                </div>

                <h3 style="margin-bottom: 1.5rem;" data-i18n="profile_stats">إحصائيات القراءة</h3>
                <div class="stats-grid">
                    <div class="stat-card glass-card">
                        <div class="stat-value" id="profile-stat-chapters">124</div>
                        <div class="stat-label" data-i18n="chapters_read">فصل مقروء</div>
                    </div>
                    <div class="stat-card glass-card">
                        <div class="stat-value" id="profile-stat-completed">12</div>
                        <div class="stat-label" data-i18n="completed_novels">رواية مكتملة</div>
                    </div>
                    <div class="stat-card glass-card">
                        <div class="stat-value" id="profile-stat-hours">45</div>
                        <div class="stat-label" data-i18n="reading_hours">ساعة قراءة</div>
                    </div>
                </div>

                <div id="profile-toast" class="profile-toast" role="status" aria-live="polite"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-root"></div>

    <script src="js/components.js"></script>
    <script>initComponents();</script>
    <script src="js/language.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const editButton = document.getElementById('profile-edit-btn');
            if (editButton) {
                editButton.addEventListener('click', (event) => {
                    if (!window.AuthManager?.state?.user) {
                        event.preventDefault();
                        window.AuthManager?.showLoginGateModal();
                        return;
                    }
                    window.location.href = 'edit-profile.html';
                });
            }

            if (window.AuthManager) {
                window.AuthManager.renderProfilePage();
            }

            const updatedKey = 'readora_profile_updated';
            if (localStorage.getItem(updatedKey) === 'true') {
                localStorage.removeItem(updatedKey);
                const toast = document.getElementById('profile-toast');
                if (toast) {
                    const langManager = window.LanguageManager || (typeof LanguageManager !== 'undefined' ? LanguageManager : null);
                    toast.textContent = langManager ? langManager.get('profile_update_success') : 'Profile updated successfully.';
                    toast.classList.add('show');
                    setTimeout(() => {
                        toast.classList.remove('show');
                    }, 3000);
                }
            }
        });
    </script>
</body>

</html>
