<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readora - المفضلة</title>
    <meta name="description" content="قائمة الروايات والمانجا المفضلة لديك على ريدورا.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="./assets/images/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="./assets/images/icon.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0a0e17">
</head>
<body>
    <!-- Navbar -->
    <div id="navbar-root"></div>

    <div style="height: 80px;"></div>

    <section class="section">
        <div class="container">
            <div class="section-header">
                <h1 class="section-title gradient-text" data-i18n="nav_favorites">المفضلة</h1>
            </div>

            <div class="card-grid" id="favorites-grid">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-root"></div>

    <script src="js/components.js"></script>
    <script>initComponents();</script>
    <script src="js/data.js"></script>
    <script src="js/language.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('favorites-grid');

            const renderFavorites = () => {
                grid.innerHTML = Array(4).fill(App.createSkeletonCard()).join('');
                
                setTimeout(() => {
                    const favIds = JSON.parse(localStorage.getItem('readora_favorites') || '[]');
                    
                    if (favIds.length === 0) {
                        grid.innerHTML = `
                            <div class="empty-state" style="grid-column: 1 / -1;">
                                <i class="ph ph-heart-break"></i>
                                <h3 data-i18n="empty_favorites">${LanguageManager.get('empty_favorites')}</h3>
                                <a href="explore.html" class="btn btn-primary" style="margin-top: 1.5rem;" data-i18n="btn_explore">${LanguageManager.get('btn_explore')}</a>
                            </div>
                        `;
                        return;
                    }

                    let html = '';
                    favIds.forEach(id => {
                        let item = window.readoraData.novels.find(n => n.id === id);
                        let isManga = false;
                        if (!item) {
                            item = window.readoraData.manga.find(m => m.id === id);
                            isManga = true;
                        }
                        if (item) {
                            html += App.createCardHTML(item, isManga);
                        }
                    });
                    
                    grid.innerHTML = html;
                }, 300);
            };

            renderFavorites();
            document.addEventListener('languageChanged', renderFavorites);
        });
    </script>
</body>
</html>
