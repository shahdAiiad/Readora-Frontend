<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readora - تصفح</title>
    <meta name="description" content="تصفح أحدث وأفضل الروايات والمانجا على منصة ريدورا.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="./assets/images/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="./assets/images/icon.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0a0e17">
</head>
<body>
    <!-- Navbar (Same as index.html - ideally in a real app this is templated, but we use vanilla HTML here) -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="ph-fill ph-book-open-text"></i> Readora
            </a>
            
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link" data-i18n="nav_home">الرئيسية</a></li>
                <li><a href="explore.html" class="nav-link active" data-i18n="nav_explore">تصفح</a></li>
                <li><a href="favorites.html" class="nav-link" data-i18n="nav_favorites">المفضلة</a></li>
                <li><a href="about.html" class="nav-link" data-i18n="nav_about">من نحن</a></li>
                <li><a href="profile.html" class="nav-link" data-i18n="nav_profile">حسابي</a></li>
                <li class="nav-login-item" id="nav-login-item"></li>
            </ul>

            <div class="nav-actions">
                <div id="auth-header-slot"></div>
                <button id="lang-toggle" class="btn-icon" aria-label="تغيير اللغة / Change language">
                    <i class="ph ph-translate"></i>
                    <span style="font-size: 0.8rem; margin: 0 4px; font-weight: bold;">EN</span>
                </button>
                <button id="theme-toggle" class="btn-icon" aria-label="تبديل الوضع الليلي والنهاري">
                    <i class="ph ph-sun"></i>
                </button>
                <button class="mobile-menu-btn btn-icon" aria-label="فتح قائمة التنقل">
                    <i class="ph ph-list"></i>
                </button>
            </div>
        </div>
    </nav>

    <div style="height: 80px;"></div> <!-- Spacer -->

    <section class="section">
        <div class="container">
            <div class="section-header" style="flex-direction: column; align-items: flex-start; gap: 1.5rem;">
                <h1 class="section-title gradient-text" data-i18n="nav_explore">تصفح</h1>
                
                <div style="display: flex; gap: 1rem; width: 100%; flex-wrap: wrap;">
                    <div class="input-group" style="flex: 1; min-width: 250px;">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" class="form-input" id="search-input" data-i18n="search_placeholder" placeholder="ابحث عن رواية أو مانجا...">
                    </div>
                    
                    <div class="tag-list" id="filter-tags">
                        <button class="tag active" data-filter="all" data-i18n="filter_all">الكل</button>
                        <button class="tag" data-filter="novel" data-i18n="filter_novel">روايات</button>
                        <button class="tag" data-filter="manga" data-i18n="filter_manga">مانجا</button>
                    </div>
                </div>
            </div>

            <div class="card-grid" id="explore-grid">
                <!-- Injected via JS -->
            </div>
        </div>
    </section>

    <script src="js/data.js"></script>
    <script src="js/language.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('explore-grid');
            const searchInput = document.getElementById('search-input');
            const filterTags = document.querySelectorAll('#filter-tags .tag');
            
            let currentFilter = 'all';
            let searchQuery = '';

            // Get initial filter from URL if present
            const urlParams = new URLSearchParams(window.location.search);
            const typeParam = urlParams.get('type');
            if (typeParam && (typeParam === 'novel' || typeParam === 'manga')) {
                currentFilter = typeParam;
                filterTags.forEach(tag => {
                    tag.classList.toggle('active', tag.getAttribute('data-filter') === currentFilter);
                });
            }

            const renderExplore = () => {
                grid.innerHTML = Array(8).fill(App.createSkeletonCard()).join('');
                
                setTimeout(() => {
                    let results = [];
                    
                    if (currentFilter === 'all' || currentFilter === 'novel') {
                        results = results.concat(window.readoraData.novels.map(n => ({...n, isManga: false})));
                    }
                    if (currentFilter === 'all' || currentFilter === 'manga') {
                        results = results.concat(window.readoraData.manga.map(m => ({...m, isManga: true})));
                    }

                    if (searchQuery) {
                        const q = searchQuery.toLowerCase();
                        results = results.filter(item => {
                            const titleAr = item.titleAr.toLowerCase();
                            const titleEn = item.titleEn.toLowerCase();
                            const author = item.author.toLowerCase();
                            return titleAr.includes(q) || titleEn.includes(q) || author.includes(q);
                        });
                    }

                 if (results.length === 0) {
    const lang = document.documentElement.lang || "ar";

               grid.innerHTML = `
               <div class="empty-state" style="grid-column: 1 / -1;">
                   <i class="ph ph-ghost"></i>
                     <h3>${lang === "ar" ? "لا توجد نتائج" : "No Results Found"}</h3>
                      <p>${lang === "ar" ? "حاول البحث بكلمات مختلفة." : "Try searching with different keywords."}</p>
                    </div>
               `;
              }    
                    else {
                        grid.innerHTML = results.map(item => App.createCardHTML(item, item.isManga)).join('');
                    }
                }, 300); // Small delay for effect
            };

            filterTags.forEach(tag => {
                tag.addEventListener('click', (e) => {
                    filterTags.forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.getAttribute('data-filter');
                    renderExplore();
                });
            });

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderExplore();
            });

            document.addEventListener('languageChanged', renderExplore);
            
            renderExplore();
        });
    </script>
</body>
</html>
