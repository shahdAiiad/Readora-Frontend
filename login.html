<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readora - Login</title>
    <meta name="description" content="سجّل الدخول إلى حسابك في ريدورا لمتابعة قراءتك.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-shell {
            width: min(100%, 460px);
            padding: 2rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-secondary);
        }

        .auth-form-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .auth-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-link {
            color: var(--accent-secondary);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 1rem 0;
            color: var(--text-muted);
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .auth-divider span {
            padding: 0 0.75rem;
        }

        .auth-message {
            min-height: 1.25rem;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .auth-message.success {
            color: var(--success);
        }

        .auth-message.error {
            color: var(--danger);
        }
        .btn-secondary[data-auth-google] {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
}
    </style>
    <link rel="icon" href="./assets/images/icon.png" type="image/png">
    <link rel="apple-touch-icon" href="./assets/images/icon.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0a0e17">
</head>
<body>
    <div class="glass-panel auth-shell">
        <div class="auth-header">
            <a href="index.html" class="logo" style="justify-content:center; margin-bottom:1rem;">
                <i class="ph-fill ph-book-open-text"></i> Readora
            </a>
            <h1 class="gradient-text" data-i18n="auth_login_title">Welcome back</h1>
            <p data-i18n="auth_login_subtitle">Sign in to continue reading.</p>
        </div>

        <div id="auth-message" class="auth-message"></div>

        <form id="login-form" class="auth-form-grid">
            <div class="input-group">
                <i class="ph ph-envelope-simple"></i>
                <input type="email" id="login-email" class="form-input" data-i18n-placeholder="auth_email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <i class="ph ph-lock-simple"></i>
                <input type="password" id="login-password" class="form-input" data-i18n-placeholder="auth_password" placeholder="Password" required>
                <button type="button" class="auth-password-toggle" data-auth-password-toggle="login-password"><i class="ph ph-eye"></i></button>
            </div>

            <div class="auth-row">
                <label class="auth-check" style="display:inline-flex; align-items:center; gap:0.5rem;">
                    <input type="checkbox" id="login-remember">
                    <span data-i18n="auth_remember_me">Remember me</span>
                </label>
                <a href="#" id="auth-forgot-link" class="auth-link" data-i18n="auth_forgot_password">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary auth-submit" data-i18n="auth_login_submit">Login</button>
        </form>

        <div class="auth-divider"><span data-i18n="auth_or">OR</span></div>

        <button type="button" class="btn btn-secondary" data-auth-google>
            <i class="ph ph-google-logo"></i> <span data-i18n="auth_continue_google">Continue with Google</span>
        </button>

        <p class="auth-row" style="justify-content:center; margin-top:1rem;">
            <span data-i18n="auth_no_account">Don't have an account?</span>
            <a href="signup.html" class="auth-link" data-i18n="auth_create_account_link">Create one now</a>
        </p>
    </div>

    <script src="js/data.js"></script>
    <script src="js/language.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
>
